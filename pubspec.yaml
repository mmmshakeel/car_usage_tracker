name: car_usage_tracker
description: "A lease car kilometer logger iOS app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.21.0
  drift_flutter: ^0.2.4

  # Navigation
  go_router: ^14.6.3

  # Charts
  fl_chart: ^0.70.2

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13

  # Riverpod code generation
  riverpod_generator: ^2.6.1
  riverpod_lint: ^2.6.1

  # Drift code generation
  drift_dev: ^2.21.0

  # Lint
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true
